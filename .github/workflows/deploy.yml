name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Python Continous Integration"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Verify Kubernetes connection
      run: |
        kubectl cluster-info
        kubectl get nodes

    - name: Deploy to Kubernetes
      run: |
        echo "Deploying to Kubernetes..."
        kubectl apply -f k8s/
        kubectl get pods
        kubectl get services

    - name: Wait for rollout to complete
      run: |
        kubectl rollout status deployment/calculator-app --timeout=300s

    - name: Verify deployment
      run: |
        echo "Checking deployment status..."
        kubectl get deployments
        kubectl get pods -l app=calculator
        kubectl get services -l app=calculator

    - name: Test application health
      run: |
        # Wait for service to be ready
        sleep 30

        # Get service URL (for LoadBalancer type)
        SERVICE_IP=$(kubectl get svc calculator-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        if [ -z "$SERVICE_IP" ]; then
          echo "Service IP not available yet, checking pod status..."
          kubectl describe svc calculator-service
        else
          echo "Service available at: http://$SERVICE_IP"
          # Test health endpoint
          curl -f http://$SERVICE_IP/health || echo "Health check failed"
        fi